name: Docker Build & Push

# Build the client and server images and push them to Amazon ECR.
# Images are built for linux/amd64 (the EC2 server arch). They also run on
# Apple-Silicon Macs under Rosetta emulation, which is fine for local testing.
# Runs on every push to main and can be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed for the OIDC token when authenticating to AWS (see note below).
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 566739890498.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      # Build both images even if one fails, and run them in parallel.
      fail-fast: false
      matrix:
        include:
          - name: server
            context: ./server
            image: wealthorbit-server
          - name: client
            context: ./client
            image: wealthorbit-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Auth to AWS. Uses stored access-key secrets — add them under
      # Settings > Secrets and variables > Actions:
      #   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
      # (an IAM user with AmazonEC2ContainerRegistryPowerUser is enough).
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # amd64 only — the EC2 server is x86_64. This keeps CI fast (no QEMU
          # emulation). It still runs on Apple-Silicon Macs via Rosetta.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The client bakes VITE_API_URL in at build time; ignored by server.
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
