name: Docker Build & Push

# Build the client and server images and push them to GitHub Container
# Registry (ghcr.io). Runs on every push to main and can be triggered
# manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed so the workflow can push images to ghcr.io using the built-in token.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      # Build both images even if one fails, and run them in parallel.
      fail-fast: false
      matrix:
        include:
          - name: server
            context: ./server
            image: wealthorbit-server
          - name: client
            context: ./client
            image: wealthorbit-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the owner automatically for ghcr.io
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The client bakes VITE_API_URL in at build time; ignored by server.
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
