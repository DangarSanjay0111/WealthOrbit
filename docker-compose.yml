services:
  mongodb:
    image: mongo:7
    container_name: wealthorbit-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    image: 566739890498.dkr.ecr.ap-south-1.amazonaws.com/wealthorbit-server:latest
    container_name: wealthorbit-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/wealthorbit
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLIENT_URL: http://localhost:8080
      PORT: 5000
    depends_on:
      - mongodb

  client:
    image: 566739890498.dkr.ecr.ap-south-1.amazonaws.com/wealthorbit-client:latest
    container_name: wealthorbit-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongodb_data: