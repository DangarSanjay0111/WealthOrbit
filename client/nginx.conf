 server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # Allow report uploads up to 15MB (nginx default is only 1MB).
      client_max_body_size 15m;

      # Forward API calls to the backend container (by service name)
      location /api/ {
          proxy_pass http://server:5000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }

      # Vite fingerprints JS/CSS filenames (index-<hash>.js), so those are
      # safe to cache forever — a new build produces new filenames.
      location /assets/ {
          expires 1y;
          add_header Cache-Control "public, immutable";
      }

      # NEVER cache index.html. It's the file that points at the current
      # hashed bundle; if the browser caches it, a redeploy keeps serving the
      # OLD JS -> stale API URL -> "asks for login every time / only works
      # after a hard refresh". always-revalidate kills that class of bug.
      location = /index.html {
          add_header Cache-Control "no-cache, no-store, must-revalidate";
          expires -1;
      }

      # SPA fallback — React Router handles routes client-side
      location / {
          try_files $uri $uri/ /index.html;
      }
  }
